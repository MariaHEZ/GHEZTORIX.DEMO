<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GHEZTORIX PRO</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<!-- LOGIN -->

<div id="loginPage">


<div class="login-card">


<h1>GHEZTORIX</h1>

<p>Sistema Digital para Gestión de Despachos</p>


<input 
id="usuario"
placeholder="Usuario">


<input 
id="password"
type="password"
placeholder="Contraseña">



<button onclick="login()">
Ingresar
</button>


</div>


</div>





<!-- DASHBOARD -->


<div id="dashboard" class="hidden">



<!-- MENU -->


<aside class="sidebar">


<h2>
GHEZTORIX
</h2>



<button onclick="mostrar('inicio')">
🏠 Inicio
</button>


<button onclick="mostrar('registro')">
👤 Registrar Cliente
</button>



<button onclick="mostrar('clientes')">
📋 Clientes
</button>



<button onclick="mostrar('documentos')">
📄 Documentos
</button>



<button onclick="mostrar('reportes')">
📊 Reportes
</button>



<button onclick="mostrar('chat')">
💬 Chat
</button>



<button onclick="cerrar()">
🚪 Salir
</button>


</aside>





<!-- CONTENIDO -->


<main>



<section id="inicio" class="pantalla">


<h1>
Panel Principal
</h1>



<div class="cards">


<div class="card">

<h2 id="totalClientes">
0
</h2>

<p>Clientes</p>

</div>




<div class="card">

<h2>
0
</h2>

<p>Facturas</p>

</div>





<div class="card">

<h2>
0
</h2>

<p>Reportes</p>

</div>


</div>


</section>







<!-- REGISTRO -->


<section id="registro" class="pantalla hidden">


<h2>
Registrar Cliente
</h2>



<input id="razon"
placeholder="Razón Social">



<input id="rfc"
placeholder="RFC">



<input id="cp"
placeholder="Código Postal">



<input id="regimen"
placeholder="Régimen Fiscal">



<input id="correo"
placeholder="Correo electrónico">



<input id="actividad"
placeholder="Actividad">



<select id="firma">

<option>
Cuenta con firma electrónica
</option>

<option>
No cuenta
</option>

</select>



<button onclick="guardarCliente()">

Guardar Cliente

</button>



</section>








<!-- CLIENTES -->


<section id="clientes" class="pantalla hidden">


<h2>
Clientes registrados
</h2>



<input 
id="buscarRFC"
placeholder="Buscar RFC">



<button onclick="buscarCliente()">
Buscar
</button>



<table>


<tbody id="tabla">

</tbody>


</table>



</section>










<!-- DOCUMENTOS -->


<section id="documentos" class="pantalla hidden">


<h2>
Documentos
</h2>


<div class="cards">


<div class="card">
📄
Factura electrónica
</div>



<div class="card">
📥
Recibidas
</div>



<div class="card">
📁
Estados de cuenta
</div>


</div>



</section>








<!-- REPORTES -->


<section id="reportes" class="pantalla hidden">


<h2>
Reportes mensuales
</h2>


<button onclick="crearReporte()">

Generar Reporte

</button>


<div id="reporte">

</div>



</section>









<!-- CHAT -->


<section id="chat" class="pantalla hidden">


<h2>
Comentarios clientes
</h2>


<input id="mensaje"
placeholder="Escribe comentario">


<button onclick="agregarComentario()">

Enviar

</button>



<div id="listaComentarios">

</div>



</section>





</main>


</div>



<script src="app.js"></script>


</body>

</html>
