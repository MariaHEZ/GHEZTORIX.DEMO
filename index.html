<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GHEZTORIX - Gestión de Despachos</title>

<style>

body{
    font-family: Arial;
    background:#eef2f3;
    margin:0;
}

header{
    background:#1f4e79;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    width:90%;
    margin:auto;
}

.card{
    background:white;
    padding:20px;
    margin:20px 0;
    border-radius:10px;
    box-shadow:0px 0px 10px #aaa;
}


input, select, button{
    width:100%;
    padding:10px;
    margin:5px 0;
}


button{
    background:#1f4e79;
    color:white;
    border:none;
    cursor:pointer;
}


table{
    width:100%;
    border-collapse:collapse;
}


td,th{
    border:1px solid #ccc;
    padding:8px;
}


</style>

</head>


<body>


<header>

<h1>GHEZTORIX</h1>
<p>Sistema Digital para la Gestión de Despachos</p>

</header>



<div class="container">



<!-- REGISTRO USUARIOS -->

<div class="card">

<h2>Registro de Usuarios</h2>


<form id="formUsuario">


<input id="nombreUsuario" 
placeholder="Nombre completo">


<input id="correoUsuario"
placeholder="Correo electrónico">


<select id="tipoUsuario">

<option value="">
Seleccione tipo usuario
</option>

<option>
Administrador
</option>

<option>
Contador
</option>

<option>
Auxiliar
</option>

</select>


<input id="passwordUsuario"
type="password"
placeholder="Contraseña">


<button type="submit">
Registrar Usuario
</button>


</form>


<table>

<thead>

<tr>
<th>Nombre</th>
<th>Correo</th>
<th>Tipo</th>
</tr>

</thead>


<tbody id="tablaUsuarios">

</tbody>


</table>



</div>





<!-- CLIENTES -->


<div class="card">


<h2>Gestión de Clientes</h2>


<input id="buscarCliente"
placeholder="Buscar cliente..."
onkeyup="buscarCliente()">



<form id="formCliente">


<input id="clienteNombre"
placeholder="Nombre cliente">


<input id="rfc"
placeholder="RFC">


<input id="telefono"
placeholder="Teléfono">


<input id="correoCliente"
placeholder="Correo">


<input id="documentacion"
placeholder="Documento asociado">


<button>
Guardar Cliente
</button>


</form>



<table>


<thead>

<tr>

<th>Nombre</th>
<th>RFC</th>
<th>Teléfono</th>
<th>Correo</th>
<th>Documento</th>

</tr>


</thead>


<tbody id="tablaClientes">


</tbody>


</table>


</div>






<!-- DOCUMENTOS -->


<div class="card">


<h2>Control Documental</h2>



<form id="formDocumento">


<input id="nombreDocumento"
placeholder="Nombre documento">


<select id="tipoDocumento">


<option>
Fiscal
</option>

<option>
Administrativo
</option>


</select>


<input type="date" id="fechaDocumento">



<button>
Registrar Documento
</button>


</form>




<table>


<thead>

<tr>

<th>Documento</th>
<th>Tipo</th>
<th>Fecha</th>


</tr>


</thead>


<tbody id="tablaDocumentos">


</tbody>


</table>


</div>




</div>







<script>


// VARIABLES

let usuarios=[];
let clientes=[];
let documentos=[];




// REGISTRO USUARIOS


document
.getElementById("formUsuario")
.addEventListener("submit",function(e){


e.preventDefault();



let nombre=
document.getElementById("nombreUsuario").value;


let correo=
document.getElementById("correoUsuario").value;


let tipo=
document.getElementById("tipoUsuario").value;


let pass=
document.getElementById("passwordUsuario").value;



if(nombre=="" || correo=="" || tipo=="" || pass==""){

alert("Complete todos los campos");

return;

}



usuarios.push({

nombre,
correo,
tipo

});



mostrarUsuarios();



alert("Usuario registrado correctamente");



this.reset();



});





function mostrarUsuarios(){


let tabla=
document.getElementById("tablaUsuarios");


tabla.innerHTML="";



usuarios.forEach(u=>{


tabla.innerHTML += `

<tr>

<td>${u.nombre}</td>

<td>${u.correo}</td>

<td>${u.tipo}</td>


</tr>

`;


});


}







// CLIENTES



document
.getElementById("formCliente")
.addEventListener("submit",function(e){


e.preventDefault();



let cliente={

nombre:
clienteNombre.value,


rfc:
rfc.value,


telefono:
telefono.value,


correo:
correoCliente.value,


documento:
documentacion.value


};




if(cliente.nombre=="" ||
cliente.rfc==""){


alert("Nombre y RFC son obligatorios");

return;

}




clientes.push(cliente);



mostrarClientes();



alert("Cliente agregado");



this.reset();



});





function mostrarClientes(lista=clientes){


tablaClientes.innerHTML="";



lista.forEach(c=>{


tablaClientes.innerHTML +=`


<tr>

<td>${c.nombre}</td>

<td>${c.rfc}</td>

<td>${c.telefono}</td>

<td>${c.correo}</td>

<td>${c.documento}</td>


</tr>



`;



});


}




// BUSQUEDA


function buscarCliente(){


let texto=
buscarCliente.value.toLowerCase();



let resultado=
clientes.filter(c=>

c.nombre.toLowerCase()
.includes(texto)

);



mostrarClientes(resultado);



}






// DOCUMENTOS




document
.getElementById("formDocumento")
.addEventListener("submit",function(e){


e.preventDefault();



let doc={

nombre:
nombreDocumento.value,


tipo:
tipoDocumento.value,


fecha:
fechaDocumento.value


};



documentos.push(doc);



mostrarDocumentos();



alert("Documento guardado");



this.reset();


});





function mostrarDocumentos(){


tablaDocumentos.innerHTML="";


documentos.forEach(d=>{


tablaDocumentos.innerHTML+=`

<tr>

<td>${d.nombre}</td>

<td>${d.tipo}</td>

<td>${d.fecha}</td>


</tr>


`;


});


}





</script>


</body>

</html>
