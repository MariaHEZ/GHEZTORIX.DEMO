<!-- index.html -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>GHEZTORIX - Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="login-container">
    <h2>Bienvenido de vuelta</h2>
    <form id="loginForm">
      <label for="user">Correo / Usuario / RFC</label>
      <input type="text" id="user" placeholder="correo@empresa.com o RFC" required>
      
      <label for="password">Contraseña</label>
      <input type="password" id="password" required>
      
      <button type="submit">Iniciar Sesión</button>
    </form>
    <p class="demo">Acceso demo: admin@gheztorix.com / admin123</p>
  </div>
  <script src="app.js"></script>
</body>
</html>
