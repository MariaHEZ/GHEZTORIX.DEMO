<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GHEZTORIX PRO</title>

<style>
body{font-family:Arial;margin:0;background:#eef3f7}
.hidden{display:none}
header{background:#0f3a5a;color:#fff;padding:15px;text-align:center}
.container{width:90%;margin:auto}
.card{background:#fff;padding:15px;margin:15px;border-radius:10px;box-shadow:0 0 10px #aaa}
input,button{width:100%;padding:10px;margin:5px 0}
button{background:#0f3a5a;color:#fff;border:none;cursor:pointer}
.menu{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.icon{background:#dbe9f7;padding:20px;text-align:center;cursor:pointer;border-radius:10px}
table{width:100%;border-collapse:collapse}
td,th{border:1px solid #ccc;padding:8px}
</style>
</head>

<body>

<header>
<h1>GHEZTORIX PRO</h1>
</header>

<div class="container">

<!-- LOGIN -->
<div id="loginScreen" class="card">
<h2>Login</h2>
<input id="usuario" placeholder="Correo">
<input id="password" type="password" placeholder="Contraseña">
<button onclick="login()">Ingresar</button>
<div id="error" style="display:none;color:red">Error de acceso</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="card hidden">

<h2>Panel Principal</h2>
<button onclick="logout()">Cerrar sesión</button>

<h3>Clientes: <span id="sTotal">0</span></h3>

<h3>Registrar cliente</h3>
<input id="cliente" placeholder="Nombre">
<input id="rfc" placeholder="RFC">
<input id="passCliente" placeholder="Contraseña cliente">
<button onclick="guardarCliente()">Guardar</button>

<h3>Buscar cliente</h3>
<input id="buscarRFC" placeholder="RFC">
<input id="buscarPASS" placeholder="Contraseña">
<button onclick="buscarCliente()">Acceder</button>

</div>

<!-- CLIENTE PANEL -->
<div id="clientePanel" class="card hidden">

<h2 id="clienteNombre"></h2>

<div class="menu">

<div class="icon" onclick="abrirModulo('documentos')">📄 Documentos</div>
<div class="icon" onclick="abrirModulo('facturas')">🧾 Facturas</div>
<div class="icon" onclick="abrirModulo('declaraciones')">📊 Declaraciones</div>
<div class="icon" onclick="abrirModulo('impuestos')">💰 Impuestos</div>
<div class="icon" onclick="abrirModulo('cuentas')">🏦 Cuentas</div>
<div class="icon" onclick="abrirModulo('reportes')">📅 Reportes</div>

</div>

<button onclick="cerrarCliente()">Cerrar cliente</button>

</div>

<!-- CRUD -->
<div id="crud" class="card hidden">

<h2 id="tituloModulo"></h2>

<input id="registro" placeholder="Agregar registro">
<button onclick="guardarModulo()">Agregar</button>

<table>
<tbody id="tabla"></tbody>
</table>

</div>

</div>

<script>

// ================= LOGIN ADMIN =================
const USER="admin@gheztorix.com";
const PASS="12345";

// ================= DATA =================
let clientes = JSON.parse(localStorage.getItem("clientes")) || [];
let clienteActivo = null;
let moduloActivo = null;

// ================= LOGIN =================
function login(){

const u=document.getElementById("usuario").value.trim();
const p=document.getElementById("password").value.trim();

if(u===USER && p===PASS){
document.getElementById("loginScreen").classList.add("hidden");
document.getElementById("dashboard").classList.remove("hidden");
document.getElementById("error").style.display="none";
renderStats();
}else{
document.getElementById("error").style.display="block";
}

}

// ================= LOGOUT =================
function logout(){
location.reload();
}

// ================= CLIENTES =================
function guardarCliente(){

let c={
id:Date.now(),
nombre:cliente.value,
rfc:rfc.value,
pass:passCliente.value,
datos:{
documentos:[],
facturas:[],
declaraciones:[],
impuestos:[],
cuentas:[],
reportes:[]
}
};

clientes.push(c);
persist();
renderStats();
alert("Cliente guardado");

cliente.value="";
rfc.value="";
passCliente.value="";
}

function buscarCliente(){

let r = clientes.find(c =>
c.rfc===buscarRFC.value &&
c.pass===buscarPASS.value
);

if(!r){alert("No encontrado");return;}

clienteActivo=r;

document.getElementById("dashboard").classList.add("hidden");
document.getElementById("clientePanel").classList.remove("hidden");

document.getElementById("clienteNombre").innerText=r.nombre;

}

// ================= MODULOS =================
function abrirModulo(m){
moduloActivo=m;
document.getElementById("crud").classList.remove("hidden");

let lista=clienteActivo.datos[m]||[];

tabla.innerHTML="";

lista.forEach((x,i)=>{
tabla.innerHTML+=`
<tr>
<td>${x}</td>
<td>
<button onclick="editar(${i})">Editar</button>
<button onclick="eliminar(${i})">Eliminar</button>
</td>
</tr>`;
});
}

function guardarModulo(){

if(!clienteActivo.datos[moduloActivo]){
clienteActivo.datos[moduloActivo]=[];
}

clienteActivo.datos[moduloActivo].push(registro.value);

persist();
abrirModulo(moduloActivo);

registro.value="";
}

function editar(i){
let n=prompt("Editar:");
if(n){
clienteActivo.datos[moduloActivo][i]=n;
persist();
abrirModulo(moduloActivo);
}
}

function eliminar(i){
clienteActivo.datos[moduloActivo].splice(i,1);
persist();
abrirModulo(moduloActivo);
}

// ================= LOCAL STORAGE =================
function persist(){
localStorage.setItem("clientes",JSON.stringify(clientes));
}

// ================= STATS =================
function renderStats(){
document.getElementById("sTotal").innerText=clientes.length;
}

// ================= CLIENTE CLOSE =================
function cerrarCliente(){
document.getElementById("clientePanel").classList.add("hidden");
document.getElementById("crud").classList.add("hidden");
document.getElementById("dashboard").classList.remove("hidden");
clienteActivo=null;
}

</script>

</body>
</html>
