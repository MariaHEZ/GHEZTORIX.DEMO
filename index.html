        .login-container h2 {
            border-left: none;

        form {

            box-sizing: border-box;
            font-size: 14px;
            background-color: var(--bg-card);
            color: var(--text-main);
            transition: all 0.2s ease;
        }

            margin-top: 20px;

            border-radius: 4px;
            width: auto;
            margin-top: 0;
        }
        .btn-delete:hover { background-color: #dc2626; }

        .error-message {

            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
            font-weight: 500;
        }

        .hidden { display: none !important; }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 20px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden; 
        }

        th, td {
            padding: 14px 16px;
            text-align: left;
            vertical-align: middle;
        }

        th { 
            background-color: #f8fafc; 
            color: var(--text-muted); 
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase; 
            letter-spacing: 0.5px;
            border-bottom: 2px solid var(--border-color);
        }

        td {
            border-bottom: 1px solid var(--border-color);
            background-color: var(--bg-card);
            font-size: 14px;
        }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background-color: #f8fafc; }

        mark {
            padding: 6px 12px;
            border-radius: 50px; 
            font-weight: 600;
            font-size: 12px;
            display: inline-block;
        }

        /* Capa superior del Spinner */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(30, 41, 59, 0.9);

            justify-content: center;
            align-items: center;
            z-index: 9999;

            color: #e2e8f0;
            font-size: 16px;
            margin-top: 15px;
            font-weight: 500;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top: 5px solid var(--accent); 
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
