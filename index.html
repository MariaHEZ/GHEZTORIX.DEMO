<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Documentación - Despacho</title>
    <style>
        /* Estilos Generales */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        main {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #eef2f3;
            padding-bottom: 20px;
        }
        h1 { color: #2c3e50; margin: 0; }
        h2 { color: #34495e; border-left: 4px solid #3498db; padding-left: 10px; margin-top: 30px; }

        /* Pantalla de Login */
        .login-container {
            max-width: 400px;
            margin: 80px auto;
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }
        .login-container h2 {
            border-left: none;
            padding-left: 0;
            margin-bottom: 25px;
            color: #2c3e50;
        }

        /* Formulario y Controles */
        form {
            background: #f8fafc;
            padding: 20px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
        }
        label {
            font-weight: 600;
            color: #475569;
            display: block;
            margin-top: 10px;
            text-align: left;
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        button {
            background-color: #2c3e50;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            font-size: 16px;
            transition: background 0.2s;
        }
        button:hover { background-color: #1a252f; }

        /* Mensajes de Error */
        .error-message {
            color: #842029;
            background-color: #f8d7da;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            display: none;
            font-size: 14px;
        }

        /* Ocultar elementos */
        .hidden {
            display: none !important;
        }

        /* Tabla */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #cbd5e1;
        }
        th { background-color: #f1f5f9; color: #475569; }
        mark {
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <!-- PANTALLA 1: Formulario de Inicio de Sesión -->
    <div id="login-screen" class="login-container">
        <h2>Ingreso al Sistema</h2>
        <div id="error-box" class="error-message">Usuario o contraseña incorrectos.</div>
        
        <form id="form-login">
            <label for="usuario">Correo Electrónico o RFC:</label>
            <input type="text" id="usuario" required placeholder="admin@despacho.com o RFC123456AAA">

            <label for="password">Contraseña:</label>
            <input type="password" id="password" required placeholder="••••••••">

            <button type="submit">Iniciar Sesión</button>
        </form>
    </div>

    <!-- PANTALLA 2: Panel de Control (Oculto al inicio) -->
    <main id="dashboard-screen" class="hidden">
        <header>
            <h1>Control de Documentación de Clientes</h1>
            <p>Panel interno para el seguimiento de obligaciones fiscales y auditoría.</p>
        </header>

        <section>
            <h2>Registrar Requerimiento de Cliente</h2>
            <form id="form-registro">
                <label for="cliente">Nombre del Cliente o Empresa:</label>
                <input type="text" id="cliente" required placeholder="Ej. Comercializadora Alfa SA de CV">

                <label for="documento">Documentación Solicitada:</label>
                <select id="documento">
                    <option value="situacion-fiscal">Constancia de Situación Fiscal</option>
                    <option value="opinion-cumplimiento">Opinión de Cumplimiento</option>
                    <option value="obligaciones">Obligaciones Fiscales</option>
                    <option value="facturas">Facturas Electrónicas</option>
                </select>

                <label for="fecha">Fecha de Alta en el Despacho:</label>
                <input type="date" id="fecha" required>

                <label for="estado">Estado Documental:</label>
                <select id="estado">
                    <option value="actualizada">Actualizada</option>
                    <option value="vencimiento">Próxima a Vencer</option>
                    <option value="pendiente">Pendiente</option>
                    <option value="pagada">Pagada</option>
                </select>

                <button type="submit">Registrar Expediente</button>
            </form>
        </section>

        <section>
            <h2>Expedientes de Clientes Registrados</h2>
            <table border="1">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Cliente / Empresa</th>
                        <th>Documento</th>
                        <th>Fecha de Alta</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Filas dinámicas -->
                </tbody>
            </table>
        </section>
    </main>

    <!-- Lógica del Sistema -->
    <script>
        // Elementos de las pantallas
        const loginScreen = document.getElementById('login-screen');
        const dashboardScreen = document.getElementById('dashboard-screen');
        const errorBox = document.getElementById('error-box');

        // Formularios
        const formLogin = document.getElementById('form-login');
        const formRegistro = document.getElementById('form-registro');
        const tablaBody = document.querySelector('table tbody');
        let contadorId = 1;

        // --- LÓGICA DE INICIO DE SESIÓN ---
        formLogin.addEventListener('submit', function(evento) {
            evento.preventDefault();
            
            const usuarioIngresado = document.getElementById('usuario').value.trim();
            const passwordIngresado = document.getElementById('password').value;

            // Datos de acceso simulados (Puedes usar cualquiera de los dos)
            const usuarioCorrectoCorreo = "admin@despacho.com";
            const usuarioCorrectoRFC = "RFC123456AAA";
            const passwordCorrecto = "12345";

            if ((usuarioIngresado === usuarioCorrectoCorreo || usuarioIngresado === usuarioCorrectoRFC) && passwordIngresado === passwordCorrecto) {
                // Si es correcto, oculta el login y muestra el panel
                loginScreen.classList.add('hidden');
                dashboardScreen.classList.remove('hidden');
                errorBox.style.display = 'none';
            } else {
                // Si es incorrecto, muestra el mensaje de alerta
                errorBox.style.display = 'block';
            }
        });

        // --- LÓGICA DEL REGISTRO DE CLIENTES ---
        formRegistro.addEventListener('submit', function(evento) {
            evento.preventDefault();

            const cliente = document.getElementById('cliente').value;
            const documentoSelect = document.getElementById('documento');
            const documentoTexto = documentoSelect.options[documentoSelect.selectedIndex].text;
            const fecha = document.getElementById('fecha').value;
            const estadoSelect = document.getElementById('estado');
            const estadoTexto = estadoSelect.options[estadoSelect.selectedIndex].text;

            let colorFondo = '#fff3cd'; 
            let colorTexto = '#856404';

            if (estadoSelect.value === 'actualizada') {
                colorFondo = '#d1e7dd'; 
                colorTexto = '#0f5132';
            } else if (estadoSelect.value === 'pagada') {
                colorFondo = '#cff4fc'; 
                colorTexto = '#055160';
            } else if (estadoSelect.value === 'vencimiento') {
                colorFondo = '#f8d7da'; 
                colorTexto = '#842029';
            }

            const nuevaFila = document.createElement('tr');
            nuevaFila.innerHTML = `
                <td>#${String(contadorId++).padStart(3, '0')}</td>
                <td><b>${cliente}</b></td>
                <td>${documentoTexto}</td>
                <td>${fecha}</td>
                <td><mark style="background-color: ${colorFondo}; color: ${colorTexto};">${estadoTexto}</mark></td>
            `;

            tablaBody.appendChild(nuevaFila);
            formRegistro.reset();
        });
    </script>

</body>
</html>
