<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>GHEZTORIX</title>

<style>

body{
font-family:Arial;
background:#eef2f7;
margin:0;
}


header{

background:#12395c;
color:white;
padding:20px;
text-align:center;

}


.container{

width:90%;
margin:auto;

}


.card{

background:white;
padding:20px;
margin:20px;
border-radius:15px;
box-shadow:0 0 10px #999;

}



input,button,select{

width:100%;
padding:10px;
margin:5px;

}



button{

background:#12395c;
color:white;
border:0;
cursor:pointer;

}



.menu{

display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;

}



.icon{

padding:30px;
background:#dbe9f7;
text-align:center;
border-radius:15px;
cursor:pointer;

}



table{

width:100%;
border-collapse:collapse;

}


td,th{

border:1px solid #ccc;
padding:8px;

}


.oculto{

display:none;

}



</style>


</head>


<body>


<header>

<h1>GHEZTORIX</h1>

<p>Sistema Digital para Gestión de Despachos</p>

</header>



<div class="container">



<!-- LOGIN -->

<div id="login" class="card">


<h2>Inicio de sesión</h2>


<input id="rfcLogin"
placeholder="RFC">


<input id="passLogin"
type="password"
placeholder="Contraseña">



<button onclick="login()">
Ingresar
</button>


<button onclick="mostrarRegistro()">
Nuevo Cliente
</button>


</div>






<!-- REGISTRO -->


<div id="registro" class="card oculto">


<h2>Registrar Cliente</h2>


<input id="nombre">

<input id="nuevoRFC"
placeholder="RFC">

<input id="correo">

<input id="password"
placeholder="Contraseña">



<button onclick="registrar()">
Guardar Cliente
</button>


</div>






<!-- PANEL -->


<div id="panel" class="oculto">



<h2>
Bienvenido:
<span id="clienteActivo"></span>
</h2>




<div class="menu">



<div class="icon"
onclick="abrir('documentos')">

📄
Documentos Fiscales

</div>




<div class="icon"
onclick="abrir('facturas')">

🧾
Facturación

</div>



<div class="icon"
onclick="abrir('declaraciones')">

📊
Declaraciones

</div>




<div class="icon"
onclick="abrir('impuestos')">

💰
Impuestos

</div>




<div class="icon"
onclick="abrir('cuentas')">

🏦
Estados de cuenta

</div>



<div class="icon"
onclick="abrir('reportes')">

📅
Reportes

</div>



</div>



<br>


<button onclick="cerrarSesion()">
Cerrar Sesión
</button>



</div>









<!-- MODULOS -->



<div id="modulos" class="card oculto">


<h2 id="titulo"></h2>


<input id="dato"
placeholder="Agregar información">


<button onclick="guardarDato()">
Guardar
</button>


<table>


<tbody id="tabla">

</tbody>


</table>



</div>





</div>








<script>


// BASE DE DATOS LOCAL


let clientes =
JSON.parse(localStorage.getItem("clientes")) || [];



let usuarioActual=null;


let modulo="";






function mostrarRegistro(){


login.style.display="none";

registro.style.display="block";


}






function registrar(){



let cliente={


nombre:nombre.value,

rfc:nuevoRFC.value,

correo:correo.value,

password:password.value,

datos:{}


};




clientes.push(cliente);



localStorage.setItem(
"clientes",
JSON.stringify(clientes)
);



alert("Cliente registrado");



registro.style.display="none";

login.style.display="block";



}







function login(){



let rfc=rfcLogin.value;


let pass=passLogin.value;




let encontrado =
clientes.find(c=>

c.rfc==rfc &&
c.password==pass

);





if(!encontrado){


alert("Datos incorrectos");

return;

}




usuarioActual=encontrado;



login.style.display="none";


panel.style.display="block";


clienteActivo.innerHTML=
encontrado.nombre;



}








function abrir(nombreModulo){



modulo=nombreModulo;



modulos.style.display="block";


titulo.innerHTML=nombreModulo.toUpperCase();



mostrarDatos();


}






function guardarDato(){



if(!usuarioActual.datos[modulo]){


usuarioActual.datos[modulo]=[];

}




usuarioActual.datos[modulo]
.push(dato.value);





localStorage.setItem(
"clientes",
JSON.stringify(clientes)
);



dato.value="";

mostrarDatos();


}







function mostrarDatos(){


tabla.innerHTML="";



let datos=
usuarioActual.datos[modulo] || [];



datos.forEach((d,i)=>{


tabla.innerHTML+=`

<tr>

<td>${d}</td>

<td>

<button onclick="editar(${i})">
Editar
</button>


<button onclick="eliminar(${i})">
Eliminar
</button>


</td>

</tr>

`;



});


}









function editar(i){



let datos=
usuarioActual.datos[modulo];



let nuevo=
prompt(
"Modificar:",
datos[i]
);



if(nuevo){


datos[i]=nuevo;


localStorage.setItem(
"clientes",
JSON.stringify(clientes)
);



mostrarDatos();


}


}






function eliminar(i){


usuarioActual.datos[modulo]
.splice(i,1);



localStorage.setItem(
"clientes",
JSON.stringify(clientes)
);



mostrarDatos();


}








function cerrarSesion(){


usuarioActual=null;


panel.style.display="none";

modulos.style.display="none";

login.style.display="block";



alert(
"Sesión cerrada. Información guardada."
);



}



</script>


</body>

</html>
