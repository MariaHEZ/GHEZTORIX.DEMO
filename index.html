<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHEZTORIX - Sistema Digital Para La Gestion De Despachos</title>
    <style>
        /* Estilos Generales */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 0;
            height: 100vh;
        }

        /* --- PANTALLA DE LOGIN PROFESIONAL (SPLIT SCREEN) --- */
        .login-wrapper {
            display: flex;
            height: 100vh;
            width: 100vw;
        }
        /* Lado Izquierdo: Imagen Corporativa */
        .login-bg-image {
            flex: 1;
            background-image: url('https://unsplash.com');
            background-size: cover;
            background-position: center;
            display: block;
        }
        /* Lado Derecho: Formulario */
        .login-side {
            width: 450px;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px;
            box-shadow: -4px 0 20px rgba(0,0,0,0.05);
        }
        .brand-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .brand-logo h2 {
            font-size: 32px;
            font-weight: 800;
            color: #1e293b;
            letter-spacing: 2px;
            margin: 0;
        }
        .brand-logo p {
            color: #64748b;
            margin: 5px 0 0 0;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Formularios del Login */
        .login-side form {
            background: none;
            border: none;
            padding: 0;
        }
        label {
            font-weight: 600;
            color: #475569;
            display: block;
            margin-top: 15px;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            margin-bottom: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
            background-color: #f8fafc;
            transition: all 0.3s;
        }
        input:focus, select:focus {
            border-color: #3b82f6;
            outline: none;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        button {
            background-color: #1e293b;
            color: white;
            padding: 14px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            font-size: 15px;
            margin-top: 15px;
            transition: background 0.2s;
        }
        button:hover { background-color: #0f172a; }

        /* Enlace de Olvidó Contraseña */
        .forgot-link {
            display: block;
            text-align: right;
            font-size: 13px;
            color: #3b82f6;
            text-decoration: none;
            margin-top: 5px;
        }
        .forgot-link:hover { text-decoration: underline; }

        /* Cuadro de Alertas */
        .error-message, .success-message {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: none;
            font-size: 14px;
            font-weight: 500;
        }
        .error-message { color: #842029; background-color: #f8d7da; border: 1px solid #f5c2c7; }
        .success-message { color: #0f5132; background-color: #d1e7dd; border: 1px solid #badbcc; }

        /* Ventana Emergente (Modal) para recuperar contraseña */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.6);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; display: none;
        }
        .modal-content {
            background: white; padding: 30px; border-radius: 8px;
            width: 90%; max-width: 400px; position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .close-btn {
            position: absolute; top: 15px; right: 15px;
            font-size: 20px; cursor: pointer; color: #64748b;
        }

        /* Ocultar elementos generales */
        .hidden { display: none !important; }

        /* --- ESTILOS DEL PANEL DE CONTROL (DASHBOARD) --- */
        main {
            max-width: 1100px;
            margin: 40px auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        header {
            text-align: left;
            margin-bottom: 35px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 { color: #1e293b; font-size: 28px; font-weight: 700; }
        header p { color: #64748b; margin: 5px 0 0 0; }
        
        .form-section {
            background: #f8fafc;
            padding: 25px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            margin-bottom: 40px;
        }
        h2 { color: #1e293b; font-size: 20px; margin-top: 0; margin-bottom: 20px; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 14px; text-align: left; border-bottom: 1px solid #e2e8f0; font-size: 14px; }
        th { background-color: #f1f5f9; color: #475569; font-weight: 600; }
        mark { padding: 4px 10px; border-radius: 4px; font-weight: bold; font-size: 12px; }

        @media (max-width: 800px) {
            .login-bg-image { display: none; }
            .login-side { width: 100%; }
        }
    </style>
</head>
<body>

    <!-- PANTALLA 1: LOGIN INTEGRADO -->
    <div id="login-screen" class="login-wrapper">
        <!-- Parte Izquierda (Imagen de Fondo de Stock Corporativo) -->
        <div class="login-bg-image"></div>
        
        <!-- Parte Derecha (Formulario) -->
        <div class="login-side">
            <div class="brand-logo">
                <h2>GHEZTORIX</h2>
                <p>Consultoría & Control Fiscal</p>
            </div>

            <div id="error-box" class="error-message">Datos incorrectos. Intente de nuevo.</div>
            <div id="success-login-box" class="success-message"></div>

            <form id="form-login">
                <label Kakao for="usuario">Correo Electrónico o RFC:</label>
                <input type="text" id="usuario" required placeholder="admin@gheztorix.com u Correo/RFC">

                <label for="password">Contraseña:</label>
                <input type="password" id="password" required placeholder="••••••••">

                <a href="#" class="forgot-link" id="open-recover">¿Olvidó su contraseña?</a>

                <button type="submit">Acceder al Sistema</button>
            </form>
        </div>
    </div>

    <!-- PANTALLA 2: PANEL DE CONTROL DE CLIENTES -->
    <main id="dashboard-screen" class="hidden">
        <header>
            <div>
                <h1>Panel Control Documental</h1>
                <p>Firma GHEZTORIX — Auditoría de Obligaciones</p>
            </div>
            <button id="btn-logout" style="width: auto; margin-top: 0; background-color: #ef4444; padding: 10px 15px;">Cerrar Sesión</button>
        </header>

        <div class="form-section">
            <h2>Registrar Requerimiento de Cliente</h2>
            <form id="form-registro">
                <label for="cliente">Nombre del Cliente o Empresa:</label>
                <input type="text" id="cliente" required placeholder="Ej. Logística Global SA">

                <label for="documento">Documentación Solicitada:</label>
                <select id="documento">
                    <option value="situacion-fiscal">Constancia de Situación Fiscal</option>
                    <option value="opinion-cumplimiento">Opinión de Cumplimiento</option>
                    <option value="obligaciones">Obligaciones Fiscales</option>
                    <option value="facturas">Facturas Electrónicas</option>
                </select>

                <label for="fecha">Fecha de Alta en el Despacho:</label>
                <input type="date" id="fecha" required>

                <label for="estado">Estado Documental:</label>
                <select id="estado">
                    <option value="actualizada">Actualizada</option>
                    <option value="vencimiento">Próxima a Vencer</option>
                    <option value="pendiente">Pendiente</option>
                    <option value="pagada">Pagada</option>
                </select>

                <button type="submit" style="background-color: #3b82f6;">Registrar Expediente</button>
            </form>
        </div>

        <section>
            <h2>Expedientes de Clientes Registrados</h2>
            <table border="1">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Cliente / Empresa</th>
                        <th>Documento</th>
                        <th>Fecha de Alta</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Filas dinámicas -->
                </tbody>
            </table>
        </section>
    </main>

    <!-- VENTANA MODAL: RECUPERAR CONTRASEÑA -->
    <div id="recover-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="close-recover">&times;</span>
<script>
    const formLogin = document.getElementById("form-login");
    const errorBox = document.getElementById("error-box");

    formLogin.addEventListener("submit", function(e) {
        e.preventDefault();
        const usuario = document.getElementById("usuario").value;
        const password = document.getElementById("password").value;

        // Aquí defines tus credenciales de prueba
        if((usuario === "admin@correo.com" || usuario === "XAXX010101000") && password === "1234"){
            // Si es administrador (correo)
            if(usuario.includes("@")){
                window.location.href = "panel.html"; 
            } 
            // Si es cliente (RFC)
            else {
                window.location.href = "cliente.html"; 
            }
        } else {
            errorBox.style.display = "block";
        }
    });
</script>
