<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GHEZTORIX | Sistema Digital</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>


<div class="container">


<header>

<h1>GHEZTORIX</h1>

<p>
Sistema digital para la gestión de despachos
</p>

</header>



<section class="login-box">


<h2>Acceso al sistema</h2>


<div class="portales">


<div 
class="portal"
onclick="seleccionarPortal('admin',this)"
>

<h3>👨‍💼 Administrador / Usuario</h3>

<p>
Ingreso con correo y contraseña
</p>

</div>



<div 
class="portal"
onclick="seleccionarPortal('cliente',this)"
>

<h3>🏢 Cliente</h3>

<p>
Ingreso con RFC y contraseña
</p>

</div>


</div>



<form id="formLogin">


<input 
id="usuario"
type="text"
placeholder="Correo o RFC"
required
>


<input 
id="password"
type="password"
placeholder="Contraseña"
required
>


<button type="submit">
Ingresar
</button>


</form>



<p id="mensaje"></p>


</section>


</div>



<script src="js/login.js"></script>


</body>

</html>
