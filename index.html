<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Portal GHEZTORIX</title>
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
  background: linear-gradient(135deg, #0d6efd, #000000);
  font-family: 'Segoe UI', sans-serif;
  color: #212529;
}

.login-card {
  max-width: 420px;
  margin: 80px auto;
  background: white;
  border-radius: 10px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  border-top: 6px solid #d4af37; /* línea dorada elegante */
}

.login-card h3 {
  color: #0d6efd;
  font-weight: 600;
}

.brand-header {
  text-align: center;
  padding: 20px;
  background: #000000; /* negro sobrio */
  color: #d4af37;       /* dorado para contraste */
  border-radius: 10px 10px 0 0;
}

.sidebar {
  height: 100vh;
  background-color: #000000; /* negro */
  color: #d4af37;            /* dorado */
  padding-top: 20px;
}

.sidebar a {
  color: #d4af37;
  text-decoration: none;
  padding: 10px;
  display: block;
  border-radius: 5px;
}

.sidebar a:hover {
  background-color: #0d6efd; /* azul corporativo al pasar el mouse */
  color: white;
}

.btn-primary {
  background-color: #0d6efd;
  border: none;
}

.btn-primary:hover {
  background-color: #0a58ca;
}

.btn-success {
  background-color: #d4af37;
  border: none;
  color: black;
}

.btn-success:hover {
  background-color: #c19e2d;
}

  <!-- Login -->
  <div id="login" class="login-card">
    <div class="brand-header">
      <h2>GHEZTORIX</h2>
      <p>Sistema Digital Empresarial</p>
    </div>
    <div class="card-body p-4">
      <h3 class="text-center mb-4">Acceso al sistema</h3>
      <input type="email" id="correo" class="form-control mb-3" placeholder="Correo electrónico" required>
      <input type="password" id="clave" class="form-control mb-3" placeholder="Contraseña" required>
      <button class="btn btn-primary w-100" onclick="login()">Entrar</button>
      <p id="mensaje" class="mt-3 text-center"></p>
    </div>
  </div>

  <!-- Portal -->
  <div id="portal" class="d-none">
    <div class="row g-0">
      <!-- Sidebar -->
      <div class="col-md-2 bg-dark text-white p-3" style="height:100vh;">
        <h4 class="text-center mb-4">Menú</h4>
        <a href="#" class="d-block text-white mb-2" onclick="mostrar('clientes')">📂 Clientes</a>
        <a href="#" class="d-block text-white mb-2" onclick="mostrar('nuevo')">➕ Nuevo Cliente</a>
        <a href="#" class="d-block text-white mb-2" onclick="mostrar('reportes')">📊 Reportes</a>
        <a href="#" class="d-block text-white mb-2" onclick="mostrar('config')">⚙️ Configuración</a>
        <a href="#" class="d-block text-white mb-2" onclick="cerrarSesion()">🚪 Cerrar Sesión</a>
      </div>
      <!-- Content -->
      <div class="col-md-10 p-4">
        <div id="clientes" class="section">
          <h3>Clientes existentes</h3>
          <input type="text" class="form-control mb-3" placeholder="Buscar por RFC o razón social">
          <ul class="list-group">
            <li class="list-group-item">Cliente Alfa - RFC123</li>
            <li class="list-group-item">Cliente Beta - RFC456</li>
          </ul>
        </div>
        <div id="nuevo" class="section d-none">
          <h3>Registrar nuevo cliente</h3>
          <form class="mt-3">
            <input type="text" class="form-control mb-2" placeholder="Razón social" required>
            <input type="text" class="form-control mb-2" placeholder="RFC" required>
            <input type="text" class="form-control mb-2" placeholder="Código postal">
            <input type="tel" class="form-control mb-2" placeholder="Teléfono">
            <input type="email" class="form-control mb-2" placeholder="Correo electrónico">
            <input type="password" class="form-control mb-2" placeholder="Contraseña">
            <button class="btn btn-success">Guardar</button>
          </form>
        </div>
        <div id="reportes" class="section d-none">
          <h3>Reportes</h3>
          <p>Mensuales y anuales (simulación).</p>
        </div>
        <div id="config" class="section d-none">
          <h3>Configuración</h3>
          <p>Opciones de usuario.</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    function login() {
      const correo = document.getElementById("correo").value;
      const clave = document.getElementById("clave").value;
      const mensaje = document.getElementById("mensaje");

      if (correo === "admin@ghez.com" && clave === "1234") {
        document.getElementById("login").classList.add("d-none");
        document.getElementById("portal").classList.remove("d-none");
      } else {
        mensaje.textContent = "Credenciales incorrectas ❌";
        mensaje.classList.add("text-danger");
      }
    }

    function mostrar(seccion) {
      document.querySelectorAll(".section").forEach(s => s.classList.add("d-none"));
      document.getElementById(seccion).classList.remove("d-none");
    }

    function cerrarSesion() {
      document.getElementById("portal").classList.add("d-none");
      document.getElementById("login").classList.remove("d-none");
    }
  </script>
</body>
</html>
