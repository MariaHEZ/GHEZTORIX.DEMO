<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login GHEZTORIX</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
 <div class="login-container">
  <div class="login-card">
    <h2>Bienvenido a GHEZTORIX</h2>
    <form id="loginForm">
     <label for="role">Tipo de acceso</label>

<select id="role" required>
    <option value="">Selecciona una opción</option>
    <option value="usuario">Usuario</option>
    <option value="cliente">Cliente</option>
</select>

<!-- LOGIN USUARIO -->
<div id="loginUsuario" style="display:none;">

    <label for="email">Correo</label>
    <input
        type="email"
        id="email"
        placeholder="ejemplo@correo.com">

    <label for="passwordUsuario">Contraseña</label>
    <input
        type="password"
        id="passwordUsuario"
        placeholder="********">

</div>

<!-- LOGIN CLIENTE -->
<div id="loginCliente" style="display:none;">

    <label for="rfc">RFC</label>
    <input
        type="text"
        id="rfc"
        maxlength="13"
        placeholder="HEMM010101ABC"
        style="text-transform:uppercase;">

    <label for="passwordCliente">Contraseña</label>
    <input
        type="password"
        id="passwordCliente"
        placeholder="********">

</div>

<button type="submit">Ingresar</button>
    </form>
  </div>
</div>

<!-- Aquí enlazas tu JS -->
<script src="js/login.js"></script>
</body>
</html>
