<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login GHEZTORIX</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <h1>Acceso al Sistema GHEZTORIX</h1>

  <form onsubmit="login(); return false;">
    <label for="tipoPortal">Selecciona portal:</label>
    <select id="tipoPortal">
      <option value="admin">Administrador / Usuario</option>
      <option value="cliente">Cliente</option>
    </select>

    <br><br>

    <label for="usuario">Correo o RFC:</label>
    <input type="text" id="usuario" required>

    <br><br>

    <label for="password">Contraseña:</label>
    <input type="password" id="password" required>

    <br><br>

    <button type="submit">Ingresar</button>
    <p id="mensaje" style="color:red;"></p>
  </form>
</body>
</html>
