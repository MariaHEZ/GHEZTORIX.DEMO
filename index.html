<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GHEZTORIX - Sistema Digital para la Gestión de Despachos</title>
<style>
body { display:flex; margin:0; font-family:Segoe UI,sans-serif; background:#f4f6f9; }
.hidden { display:none!important }

/* LOGIN */
.login { max-width:520px; margin:25px auto; background:#fff; padding:25px; border-radius:12px; box-shadow:0 2px 10px rgba(0,0,0,.15) }
.logo { text-align:center }
.logo h1 { color:#163c8c; margin:0; font-size:42px }
.logo p { color:#666 }
button { padding:10px 14px; border:none; border-radius:6px; cursor:pointer; background:#163c8c; color:#fff; margin:4px }

/* SIDEBAR */
.sidebar { width:220px; background:#163c8c; color:#fff; min-height:100vh; padding:20px; }
.sidebar h2 { margin:0 0 20px; }
.sidebar ul { list-style:none; padding:0; }
.sidebar li { padding:10px; cursor:pointer; border-radius:6px; }
.sidebar li:hover { background:#4a6cd1; }
.logout { margin-top:20px; background:#c62828; width:100%; }

/* CONTENT */
.content { flex:1; padding:20px; background:#f4f6f9; }
header h1 { margin:0 0 20px; }

/* DASHBOARD CARDS */
.stats { display:grid; grid-template-columns:repeat(4,1fr); gap:15px; margin-bottom:20px; }
.card { background:#fff; padding:20px; border-radius:12px; box-shadow:0 2px 6px rgba(0,0,0,.1); text-align:center; }
.card.verde { border-left:6px solid #4caf50; }
.card.rojo { border-left:6px solid #f44336; }
.card.amarillo { border-left:6px solid #ff9800; }
.card.azul { border-left:6px solid #2196f3; }

/* TABLAS */
section { background:#fff; padding:20px; border-radius:12px; box-shadow:0 2px 6px rgba(0,0,0,.1); margin-bottom:20px; }
table { width:100%; border-collapse:collapse; margin-top:10px; }
th,td { padding:10px; border-bottom:1px solid #ddd; }
tr:nth-child(even){background:#f9f9f9;}
.actions button { margin-right:6px; }

/* 📱 RESPONSIVO */
@media (max-width: 768px) {
  body { flex-direction:column; }
  .sidebar { width:100%; min-height:auto; display:flex; flex-direction:row; overflow-x:auto; }
  .sidebar ul { display:flex; flex-direction:row; gap:10px; }
  .sidebar li { flex:1; text-align:center; }
  .content { padding:10px; }
  .stats { grid-template-columns:repeat(2,1fr); }
}

@media (max-width: 480px) {
  .stats { grid-template-columns:1fr; }
  table, th, td { font-size:14px; }
  button { padding:8px; font-size:14px; }
}
</style>
</head>
<body>
