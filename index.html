<script>

const USER="admin@gheztorix.com";
const PASS="12345";

let clientes =
JSON.parse(localStorage.getItem("clientes")) || [];

let clienteEditando=null;


// LOGIN

function login(){

const usuario =
document.getElementById("usuario").value.trim();

const password =
document.getElementById("password").value.trim();


if(usuario===USER && password===PASS){


localStorage.setItem("sesion","activa");


document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";


mostrarClientes();


}else{

document.getElementById("mensaje").innerHTML =
"Usuario incorrecto";

}

}



window.onload=function(){

if(localStorage.getItem("sesion")=="activa"){

document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";

mostrarClientes();

}

}




function salir(){

localStorage.removeItem("sesion");

location.reload();

}




// MODAL


function abrirModal(){

document.getElementById("modal")
.style.display="flex";

}


function cerrarModal(){

document.getElementById("modal")
.style.display="none";

limpiarCampos();

}



function limpiarCampos(){

document.getElementById("nombre").value="";
document.getElementById("rfc").value="";
document.getElementById("correo").value="";
document.getElementById("actividad").value="";
document.getElementById("clave").value="";

clienteEditando=null;

}



// GUARDAR


function guardarCliente(){

let docsActuales = [];

if(clienteEditando){
let clienteExistente = clientes.find(c => c.id == clienteEditando);
docsActuales = clienteExistente ? clienteExistente.documentos : [];
}

let nuevo = {

id: clienteEditando || Date.now(),

nombre: document.getElementById("nombre").value,

rfc: document.getElementById("rfc").value.toUpperCase(),

correo: document.getElementById("correo").value,

actividad: document.getElementById("actividad").value,

clave: document.getElementById("clave").value,

documentos: docsActuales

};



if(clienteEditando){

clientes = clientes.map(c =>
c.id == clienteEditando ? nuevo : c
);

}else{

if(clientes.find(c => c.rfc == nuevo.rfc)){
alert("RFC ya registrado");
return;
}

clientes.push(nuevo);

}



localStorage.setItem("clientes", JSON.stringify(clientes));

cerrarModal();
mostrarClientes();

}








// TABLA


function mostrarClientes(){


tabla.innerHTML="";


clientes.forEach(c=>{


tabla.innerHTML += `

<tr>

<td>${c.nombre}</td>

<td>${c.rfc}</td>

<td>${c.correo}</td>


<td>


<button onclick="verCliente(${c.id})">
👁 Ver
</button>


<button onclick="editar(${c.id})">
✏ Editar
</button>


<button onclick="eliminar(${c.id})">
🗑 Eliminar
</button>


</td>


</tr>

`;

});


totalClientes.innerHTML =
clientes.length;


}




// EDITAR


function editar(id){

let c =
clientes.find(x=>x.id==id);

clienteEditando = id;


document.getElementById("nombre").value = c.nombre;
document.getElementById("rfc").value = c.rfc;
document.getElementById("correo").value = c.correo;
document.getElementById("actividad").value = c.actividad;
document.getElementById("clave").value = c.clave;

abrirModal();

}



// ELIMINAR


function eliminar(id){


if(confirm("¿Eliminar cliente?")){


clientes =
clientes.filter(c=>c.id!=id);


localStorage.setItem(
"clientes",
JSON.stringify(clientes)
);


mostrarClientes();

}


}




// BUSCAR RFC


function buscarRFC(){


let dato =
prompt("Ingrese RFC");


let c =
clientes.find(
x=>x.rfc==dato.toUpperCase()
);


if(c){

verCliente(c.id);

}else{

alert("Cliente no encontrado");

}


}




// EXPEDIENTE


function verCliente(id){

let c =
clientes.find(x=>x.id==id);

let listaDocs = "";

if(!c.documentos){
c.documentos = [];
}

if(c.documentos && c.documentos.length > 0){

c.documentos.forEach((doc, index)=>{
listaDocs += `📄 ${index+1}. ${doc}\n`;
});

}else{
listaDocs = "Sin documentos";
}

alert(`

📁 EXPEDIENTE DIGITAL GHEZTORIX

Cliente:
${c.nombre}

RFC:
${c.rfc}

Correo:
${c.correo}

Actividad:
${c.actividad}

Documentos:
${listaDocs}

`);

  }
</script>
