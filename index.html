<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GHEZTORIX - Login</title>


<style>

body{

margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0f172a;
font-family:Segoe UI;

}


.login{

background:white;
width:350px;
padding:35px;
border-radius:15px;
box-shadow:0 10px 30px #0005;
}


h1{

text-align:center;
color:#163c8c;

}


input{

width:100%;
padding:12px;
margin:10px 0;
box-sizing:border-box;

}


button{

width:100%;
padding:12px;
background:#163c8c;
color:white;
border:0;
border-radius:8px;
cursor:pointer;

}


button:hover{

background:#0b2d70;

}


#error{

color:red;
text-align:center;

}


</style>

</head>


<body>


<div class="login">


<h1>GHEZTORIX</h1>


<input 
id="correo"
placeholder="Correo">


<input 
id="password"
type="password"
placeholder="Contraseña">


<button onclick="login()">

Iniciar Sesión

</button>


<p id="error"></p>


</div>



<script>


function login(){


let correo =
document.getElementById("correo").value;


let pass =
document.getElementById("password").value;



if(
correo=="admin@gheztorix.com"
&&
pass=="12345"

){


localStorage.setItem(
"sesion",
"activa"
);


window.location="dashboard.html";


}

else{


document.getElementById("error")
.innerHTML=
"Usuario o contraseña incorrectos";


}



}



</script>


</body>

</html>
