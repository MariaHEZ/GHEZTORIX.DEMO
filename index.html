<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GHEZTORIX ERP</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="center">
  <div class="cardLogin">
    <h2>GHEZTORIX ERP</h2>

    <input id="user" placeholder="Usuario">
    <input id="pass" type="password" placeholder="Contraseña">

    <button onclick="login()">Ingresar</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="app" class="hidden">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>ERP</h2>

    <button onclick="openModule('home')">🏠 Inicio</button>
    <button onclick="openModule('clientes')">👤 Clientes</button>
    <button onclick="openModule('busqueda')">🔎 Buscar RFC</button>
    <button onclick="logout()">🚪 Salir</button>
  </aside>

  <!-- CONTENIDO -->
  <main class="main">

    <!-- HOME -->
    <section id="home" class="module">
      <h1>Dashboard ERP</h1>

      <div class="grid">
        <div class="box">Clientes: <span id="total"></span></div>
        <div class="box">Sistema activo</div>
        <div class="box">LocalStorage DB</div>
      </div>
    </section>

    <!-- CLIENTES -->
    <section id="clientes" class="module hidden">

      <h2>Registro de Clientes</h2>

      <div class="form">

        <input id="razon" placeholder="Razón Social">
        <input id="rfc" placeholder="RFC">
        <input id="cp" placeholder="Código Postal">
        <input id="regimen" placeholder="Régimen Fiscal">
        <input id="correo" placeholder="Correo">
        <input id="passCli" placeholder="Contraseña cliente">

        <label>
          Firma electrónica:
          <select id="firma">
            <option>Sí</option>
            <option>No</option>
          </select>
        </label>

        <input id="actividad" placeholder="Actividad económica">

        <button onclick="addClient()">Registrar Cliente</button>
      </div>

      <table>
        <thead>
          <tr>
            <th>Razón Social</th>
            <th>RFC</th>
            <th>Correo</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="table"></tbody>
      </table>

    </section>

    <!-- BUSQUEDA -->
    <section id="busqueda" class="module hidden">

      <h2>Buscar Cliente por RFC</h2>

      <input id="searchRfc" placeholder="RFC">
      <button onclick="search()">Buscar</button>

      <div id="result"></div>

    </section>

  </main>

</div>

<script src="app.js"></script>
</body>
</html>
