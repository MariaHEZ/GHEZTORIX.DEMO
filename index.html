<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | GHEZTORIX</title>


<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">


<link rel="stylesheet" href="css/style.css">


</head>


<body>


<div class="login-container">


<div class="login-card">



<div class="logo-login">

<h1>
GHEZTORIX
</h1>

<p>
Sistema Administrativo Fiscal
</p>

</div>



<form id="loginForm">


<label>
Tipo de acceso
</label>


<select id="role" required>


<option value="">
Selecciona una opción
</option>


<option value="usuario">
👨‍💼 Administrador
</option>


<option value="cliente">
👤 Cliente
</option>


</select>





<!-- LOGIN USUARIO -->

<div id="loginUsuario" class="bloque-login">


<label>
Correo electrónico
</label>


<input

type="email"

id="email"

placeholder="usuario@gheztorix.com"

>



<label>
Contraseña
</label>


<input

type="password"

id="passwordUsuario"

placeholder="********"

>


</div>






<!-- LOGIN CLIENTE -->

<div id="loginCliente" class="bloque-login">


<label>
RFC
</label>


<input

type="text"

id="rfc"

maxlength="13"

placeholder="ABC123456XXX"

>


<label>
Contraseña
</label>


<input

type="password"

id="passwordCliente"

placeholder="********"

>


</div>





<button type="submit">

🔐 Ingresar

</button>



<p id="mensajeLogin"></p>



</form>



</div>


</div>





<script src="js/login.js"></script>


</body>


</html>
