<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login GHEZTORIX</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      background: url("assets/portada.png") no-repeat center center fixed;
      background-size: cover;
    }
    .login-container {
      max-width: 400px;
      margin: 100px auto;
      padding: 20px;
      background: rgba(255,255,255,0.9);
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>Acceso al sistema</h2>
    <form id="loginForm">
      <input type="text" id="user" placeholder="Usuario / RFC" required>
      <input type="password" id="password" placeholder="Contraseña" required>
      <button type="submit">Ingresar</button>
    </form>
    <p class="demo">Demo: admin@despacho.com / admin123</p>
  </div>
  <script src="app.js"></script>
</body>
</html>
