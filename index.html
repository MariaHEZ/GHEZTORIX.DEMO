<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GHEZTORIX ERP</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>


<!-- LOGIN -->

<div id="login" class="login">

<h1>GHEZTORIX</h1>

<input id="usuario" placeholder="Usuario">

<input id="password" type="password" placeholder="Contraseña">

<button onclick="entrar()">
Iniciar sesión
</button>

</div>



<!-- DASHBOARD -->

<div id="dashboard" class="hidden">


<header>

<h1>Panel Principal GHEZTORIX</h1>

<button onclick="salir()">
Cerrar sesión
</button>

</header>



<div class="cards">


<div class="icon"
onclick="abrir('registro')">

👤
<h3>Registrar Cliente</h3>

</div>



<div class="icon"
onclick="abrir('clientes')">

📋
<h3>Clientes</h3>

</div>



<div class="icon"
onclick="abrir('reportes')">

📊
<h3>Reportes</h3>

</div>



<div class="icon"
onclick="abrir('chat')">

💬
<h3>Comentarios</h3>

</div>



</div>





<!-- REGISTRO -->

<section id="registro" class="modulo hidden">

<h2>Registrar Cliente</h2>


<input id="razon" placeholder="Razón Social">

<input id="rfc" placeholder="RFC">

<input id="correo" placeholder="Correo">

<input id="actividad" placeholder="Actividad">


<button onclick="guardarCliente()">
Guardar
</button>


</section>





<!-- CLIENTES -->


<section id="clientes" class="modulo hidden">


<h2>Clientes registrados</h2>


<table>

<tbody id="lista"></tbody>

</table>


</section>







<!-- REPORTES -->


<section id="reportes" class="modulo hidden">


<h2>Reportes</h2>


<p>
Clientes registrados:
<span id="cantidad"></span>
</p>


<button onclick="generarReporte()">
Generar reporte
</button>


<div id="reporte"></div>


</section>







<!-- CHAT -->


<section id="chat" class="modulo hidden">


<h2>Comentarios de clientes</h2>


<input id="mensaje"
placeholder="Escribe comentario">


<button onclick="agregarComentario()">
Enviar
</button>


<div id="comentarios"></div>


</section>




</div>



<script src="app.js"></script>

</body>
</html>
