<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GHEZTORIX </title>

<style>
body{
margin:0;
font-family:Arial;
transition:0.3s;
}

/* DARK MODE */
body.dark{
background:#121212;
color:white;
}

/* LOGIN */
#login{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#1e3c72,#2a5298);
}

.box{
background:white;
padding:25px;
border-radius:10px;
width:300px;
}

input{
width:100%;
margin:8px 0;
padding:10px;
}

button{
padding:8px;
border:none;
cursor:pointer;
width:100%;
margin-top:5px;
}

.primary{background:#2a5298;color:white;}
.danger{background:red;color:white;}
.edit{background:orange;color:white;}

/* APP */
#app{display:none;}

.sidebar{
width:220px;
background:#1e1e2f;
color:white;
position:fixed;
height:100%;
padding:20px;
}

.sidebar a{
display:block;
padding:10px;
background:#2a2a40;
margin-top:10px;
cursor:pointer;
border-radius:5px;
}

.main{
margin-left:240px;
padding:20px;
}

/* CARDS */
.cards{
display:flex;
gap:10px;
}

.card{
flex:1;
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

/* TABLE */
table{
width:100%;
margin-top:15px;
background:white;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
}

canvas{
background:white;
margin-top:20px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<div class="box">
<h2>GHEZTORIX LOGIN</h2>
<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Contraseña">
<button class="primary" onclick="login()">Entrar</button>
</div>
</div>

<!-- APP -->
<div id="app">

<div class="sidebar">
<h2>GHEZTORIX</h2>

<a onclick="show('dash')">📊 Gestión</a>
<a onclick="show('clientes')">👤 Clientes</a>
<a onclick="toggleDark()">🌙 Modo</a>
<a onclick="logout()">🚪 Salir</a>
</div>

<div class="main">

<!-- DASH -->
<div id="dash">
<h1>Gestión</h1>

<div class="cards">
<div class="card">
<h3>Total Clientes</h3>
<p id="total">21</p>
</div>
</div>

<div class="cards">
<div class="card">
<h3>Reportes Pendientes</h3>
<p id="total">2</p>
</div>
</div>

<canvas id="chart" width="400" height="200"></canvas>
</div>

<!-- CLIENTES -->
<div id="clientes" style="display:none">

<h1>Clientes</h1>

<input class="input"
id="Razón Social"
placeholder="Razón Social">


<input class="input" 
id="RFC" 
placeholder="RFC">


<input class="input" 
id="CODIGO POSTAL" 
placeholder="Código Postal">


<select id="Regimen">

<option>
601 - REGIMEN GENERAL DE LEY PERSONAS MORALES
</option>

<option>
602 - RÉGIMEN SIMPLIFICADO DE LEY PERSONAS MORALES
</option>

<option>
603 - PERSONAS MORALES CON FINES NO LUCRATIVOS
</option>

<option>
605 - RÉGIMEN DE SUELDOS Y SALARIOS E INGRESOS ASIMILADOS A SALARIOS
</option>

<option>
606 - RÉGIMEN DE ARRENDAMIENTO
</option>

<option>
607 - RÉGIMEN DE ENAJENACIÓN O ADQUISICIÓN DE BIENES
</option>

<option>
612 - RÉGIMEN DE LAS PERSONAS FÍSICAS CON ACTIVIDADES EMPRESARIALES Y PROFESIONALES
</option>

<option>
616 - SIN OBLIGACIONES FISCALES
</option>

<option>
621 - RÉGIMEN DE INCORPORACIÓN FISCAL
</option>

<option>
625 - RÉGIMEN DE LAS ACTIVIDADES EMPRESARIALES CON INGRESOS A TRAVÉS DE PLATAFORMAS TECNOLÓGICAS
</option>

<option>
626 - RÉGIMEN SIMPLIFICADO DE CONFIANZA
</option>

</select>


<input class="input" 
id="telefono"
placeholder="Número Telefónico">


<input class="input" 
id="correo"
placeholder="Correo Electrónico">


<h3>Acceso Cliente</h3>


<input class="input" 
id="usuarioCliente" 
placeholder="Usuario Cliente">



<input class="input" 
id="passCliente"
placeholder="Contraseña Cliente">

<button class="primary" onclick="add()">Agregar</button>

  
<input id="buscar" placeholder="Buscar..." onkeyup="render()">

<table>
<thead>
<tr>
<th>ID</th>
<th>RFC</th>
<th>RAZÓN SOCIAL</th>
<th>Acciones</th>
</tr>
</thead>

<tbody id="tabla"></tbody>
</table>

</div>

</div>
</div>

<script>

/* USERS */
const USERS=[
{u:"admin",p:"12345",role:"admin"},
{u:"user",p:"123",role:"user"}
];

let session=null;

/* CLIENTES */
let clientes=JSON.parse(localStorage.getItem("clientes"))||[];

/* LOGIN */
function login(){
let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

let found=USERS.find(x=>x.u===u && x.p===p);

if(found){
session=found;
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
render();
update();
chart();
}else{
alert("Error login");
}
}

/* LOGOUT */
function logout(){
location.reload();
}

/* NAV */
function show(s){
document.getElementById("dash").style.display="none";
document.getElementById("clientes").style.display="none";
document.getElementById(s).style.display="block";
update();
chart();
}

/* ADD */
function add(){
let n=document.getElementById("nombre").value;
let r=document.getElementById("rfc").value;

if(!n||!r)return;

clientes.push({id:Date.now(),nombre:n,rfc:r});

localStorage.setItem("clientes",JSON.stringify(clientes));

render();
update();
chart();
}

/* DELETE */
function del(id){
clientes=clientes.filter(c=>c.id!==id);
localStorage.setItem("clientes",JSON.stringify(clientes));
render();
update();
chart();
}

/* EDIT */
function edit(id){
let c=clientes.find(x=>x.id===id);
let n=prompt("Nuevo nombre",c.nombre);
let r=prompt("Nuevo RFC",c.rfc);

if(n&&r){
c.nombre=n;
c.rfc=r;
localStorage.setItem("clientes",JSON.stringify(clientes));
render();
update();
chart();
}
}

/* RENDER */
function render(){
let f=document.getElementById("buscar").value?.toLowerCase()||"";
let t=document.getElementById("tabla");
t.innerHTML="";

clientes
.filter(c=>c.nombre.toLowerCase().includes(f)||c.rfc.toLowerCase().includes(f))
.forEach(c=>{
t.innerHTML+=`
<tr>
<td>${c.id}</td>
<td>${c.nombre}</td>
<td>${c.rfc}</td>
<td>
<button class="edit" onclick="edit(${c.id})">Editar</button>
<button class="danger" onclick="del(${c.id})">X</button>
</td>
</tr>`;
});
}

/* DASH */
function update(){
document.getElementById("total").innerText=clientes.length;
}

/* CHART SIMPLE */
function chart(){
let ctx=document.getElementById("chart").getContext("2d");
ctx.clearRect(0,0,400,200);

ctx.fillStyle="#2a5298";
ctx.fillRect(50,150-clientes.length*10,50,clientes.length*10);

ctx.fillStyle="#999";
ctx.fillText("Clientes",50,180);
}

/* DARK MODE */
function toggleDark(){
document.body.classList.toggle("dark");
}

</script>

</body>
</html>
