<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GHEZTORIX LOGIN</title>

<style>
body{
margin:0;
font-family:Arial;
background:#111827;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:#1E3A8A;
padding:30px;
border-radius:15px;
width:300px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:10px;
background:#10B981;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="login-box">
<h2>GHEZTORIX</h2>

<input id="usuario" placeholder="Correo o usuario">
<input id="password" type="password" placeholder="Contraseña">

<button onclick="login()">Entrar</button>
</div>

<script>

const ADMIN_USER = "admin@gheztorix.com";
const ADMIN_PASS = "12345";

function login(){

const u = document.getElementById("usuario").value;
const p = document.getElementById("password").value;

if(u === ADMIN_USER && p === ADMIN_PASS){

localStorage.setItem("sesion", JSON.stringify({tipo:"admin", user:u}));

window.location.href = "panel.html";

}else{

// buscar cliente
let clientes = JSON.parse(localStorage.getItem("clientes")) || [];

let cliente = clientes.find(c => c.rfc === u && c.password === p);

if(cliente){
localStorage.setItem("sesion", JSON.stringify({tipo:"cliente", data:cliente}));
window.location.href = "cliente.html";
}else{
alert("Credenciales incorrectas");
}

}

}

</script>

</body>
</html>
