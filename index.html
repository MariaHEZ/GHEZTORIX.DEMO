<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GHEZTORIX Login</title>

<link rel="stylesheet" href="css/login.css">
</head>

<body>

<div class="background"></div>

<div class="login-wrapper">

    <div class="login-box">

        <!-- LOGO -->
        <div class="logo">💼 GHEZTORIX</div>
        <p class="subtitle">Despacho Contable Profesional</p>

        <!-- INPUTS -->
        <input type="text" id="usuario" placeholder="Usuario o correo">
        <input type="password" id="password" placeholder="Contraseña">

        <div id="msg"></div>

        <!-- LOADING -->
        <div id="loading">Iniciando sesión...</div>

        <button onclick="login()" id="btnLogin">Ingresar</button>

    </div>

</div>

<script src="js/login.js"></script>

</body>
</html>
