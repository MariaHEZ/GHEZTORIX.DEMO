<script>

const USER="admin@gheztorix.com";
const PASS="12345";

let clientes =
JSON.parse(localStorage.getItem("clientes")) || [];

let clienteEditando=null;


// LOGIN

function login(){

const usuario =
document.getElementById("usuario").value.trim();

const password =
document.getElementById("password").value.trim();


if(usuario===USER && password===PASS){


localStorage.setItem("sesion","activa");


document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";


mostrarClientes();


}else{

document.getElementById("mensaje").innerHTML =
"Usuario incorrecto";

}

}



window.onload=function(){

if(localStorage.getItem("sesion")=="activa"){

document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";

mostrarClientes();

}

}




function salir(){

localStorage.removeItem("sesion");

location.reload();

}




// MODAL


function abrirModal(){

document.getElementById("modal")
.style.display="flex";

}


function cerrarModal(){

document.getElementById("modal")
.style.display="none";

limpiarCampos();

}



function limpiarCampos(){

document.getElementById("nombre").value="";
document.getElementById("rfc").value="";
document.getElementById("correo").value="";
document.getElementById("actividad").value="";
document.getElementById("clave").value="";

clienteEditando=null;

}



// GUARDAR


function guardarCliente(){


let nuevo={

id: clienteEditando || Date.now(),

nombre:
nombre.value,

rfc:
rfc.value.toUpperCase(),

correo:
correo.value,

actividad:
actividad.value,

clave:
clave.value,

documentos:[]

};



if(clienteEditando){


clientes =
clientes.map(c=>

c.id==clienteEditando ? nuevo : c

);


}

else{


if(clientes.find(c=>c.rfc==nuevo.rfc)){

alert("RFC ya registrado");

return;

}


clientes.push(nuevo);


}



localStorage.setItem(
"clientes",
JSON.stringify(clientes)
);



cerrarModal();

mostrarClientes();

}





// TABLA


function mostrarClientes(){


tabla.innerHTML="";


clientes.forEach(c=>{


tabla.innerHTML += `

<tr>

<td>${c.nombre}</td>

<td>${c.rfc}</td>

<td>${c.correo}</td>


<td>


<button onclick="verCliente(${c.id})">
👁 Ver
</button>


<button onclick="editar(${c.id})">
✏ Editar
</button>


<button onclick="eliminar(${c.id})">
🗑 Eliminar
</button>


</td>


</tr>

`;

});


totalClientes.innerHTML =
clientes.length;


}




// EDITAR


function editar(id){


let c =
clientes.find(x=>x.id==id);



clienteEditando=id;


nombre.value=c.nombre;
rfc.value=c.rfc;
correo.value=c.correo;
actividad.value=c.actividad;
clave.value=c.clave;


abrirModal();


}





// ELIMINAR


function eliminar(id){


if(confirm("¿Eliminar cliente?")){


clientes =
clientes.filter(c=>c.id!=id);


localStorage.setItem(
"clientes",
JSON.stringify(clientes)
);


mostrarClientes();

}


}




// BUSCAR RFC


function buscarRFC(){


let dato =
prompt("Ingrese RFC");


let c =
clientes.find(
x=>x.rfc==dato.toUpperCase()
);


if(c){

verCliente(c.id);

}else{

alert("Cliente no encontrado");

}


}




// EXPEDIENTE


function verCliente(id){


let c =
clientes.find(x=>x.id==id);



alert(`

EXPEDIENTE DIGITAL GHEZTORIX


Cliente:

${c.nombre}


RFC:

${c.rfc}


Correo:

${c.correo}


Actividad:

${c.actividad}


Documentos:

${c.documentos.length}


`);

}


</script>
