<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Administrador GHEZTORIX</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background-color: #f0f0f0; }
    button { margin: 2px; }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>GHEZTORIX Admin</h2>
    <a href="#">🏠 Inicio</a>
    <a href="#">📦 Despachos</a>
    <a href="#">👥 Clientes</a>
    <a href="#">📊 Reportes</a>
    <a href="#">⚙️ Configuración</a>
    <a href="index.html">🚪 Cerrar sesión</a>
  </div>

  <div class="main">
    <h1>Panel de Administración</h1>
    <h2>Gestión de Clientes</h2>

    <!-- Formulario para agregar -->
    <form id="formCliente">
      <input type="text" id="nombre" placeholder="Nombre" required>
      <input type="email" id="correo" placeholder="Correo" required>
      <button type="submit">Agregar Cliente</button>
    </form>

    <!-- Tabla de clientes -->
    <table id="tablaClientes">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Correo</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script>
    const clientes = [];

    const form = document.getElementById("formCliente");
    const tabla = document.getElementById("tablaClientes").querySelector("tbody");

    function renderTabla() {
      tabla.innerHTML = "";
      clientes.forEach((c, i) => {
        const fila = document.createElement("tr");
        fila.innerHTML = `
          <td>${c.nombre}</td>
          <td>${c.correo}</td>
          <td>
            <button onclick="editarCliente(${i})">Editar</button>
            <button onclick="eliminarCliente(${i})">Eliminar</button>
          </td>
        `;
        tabla.appendChild(fila);
      });
    }

    form.addEventListener("submit", e => {
      e.preventDefault();
      const nombre = document.getElementById("nombre").value;
      const correo = document.getElementById("correo").value;
      clientes.push({ nombre, correo });
      renderTabla();
      form.reset();
    });

    window.eliminarCliente = function(i) {
      clientes.splice(i, 1);
      renderTabla();
    }

    window.editarCliente = function(i) {
      const nuevoNombre = prompt("Nuevo nombre:", clientes[i].nombre);
      const nuevoCorreo = prompt("Nuevo correo:", clientes[i].correo);
      if (nuevoNombre && nuevoCorreo) {
        clientes[i] = { nombre: nuevoNombre, correo: nuevoCorreo };
        renderTabla();
      }
    }
  </script>
</body>
</html>
