<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHEZTORIX - Panel de Control</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f6f9;
            color: #333;
        }
        header {
            background-color: #163c8c; /* El azul de tu logo */
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 {
            margin: 0;
            font-size: 20px;
        }
        .logout-btn {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
        }
        .container {
            padding: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .welcome-box {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 5px solid #163c8c;
        }
        .card h3 {
            margin-top: 0;
            color: #666;
            font-size: 14px;
            text-transform: uppercase;
        }
        .card .number {
            font-size: 28px;
            font-weight: bold;
            color: #163c8c;
            margin: 10px 0 0 0;
        }
    </style>
</head>
<body>

    <header>
        <h1>GHEZTORIX — Sistema de Gestión de Despachos</h1>
        <a href="index.html" class="logout-btn">Cerrar Sesión</a>
    </header>

    <div class="container">
        <div class="welcome-box">
            <h2>Bienvenido al Panel de Control</h2>
            <p>Identificado como: <strong>admin@gheztorixgmail.com</strong></p>
        </div>

        <!-- Vista rápida de métricas/datos del sistema -->
        <div class="dashboard-grid">
            <div class="card">
                <h3>Despachos Pendientes</h3>
                <p class="number">12</p>
            </div>
            <div class="card">
                <h3>En Ruta</h3>
                <p class="number">5</p>
            </div>
            <div class="card">
                <h3>Entregados Hoy</h3>
                <p class="number">24</p>
            </div>
        </div>
    </div>

</body>
</html>
