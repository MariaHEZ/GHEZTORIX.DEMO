<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Clientes | GHEZTORIX</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1>Registro de Clientes</h1>

<form id="formCliente">

    <input type="text" id="razon" placeholder="Razón social" required><br><br>

    <input type="text" id="rfc" placeholder="RFC" required><br><br>

    <input type="email" id="correo" placeholder="Correo"><br><br>

    <input type="text" id="telefono" placeholder="Teléfono"><br><br>

    <input type="password" id="password" placeholder="Contraseña" required><br><br>

    <button type="submit">Guardar Cliente</button>

</form>

<hr>

<h2>Lista de Clientes</h2>
<div id="listaClientes"></div>

<script src="js/clientes.js"></script>

</body>
</html>
