<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GHEZTORIX | Agregar Clientes</title>

<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="dashboard">

  <!-- SIDEBAR SIMPLE -->
  <aside class="sidebar">

    <div class="logo">
      <h2>GHEZTORIX</h2>
      <small>Panel administrativo</small>
    </div>

    <nav class="menu">

      <a href="dashboard.html">🏠 Panel principal</a>
      <a href="clientes.html">👥 Clientes</a>
      <a class="active" href="registro_cliente.html">➕ Agregar clientes</a>
      <a href="documentos.html">📂 Documentos</a>
      <a href="calendario.html">📅 Calendario</a>
      <a href="reportes.html">📊 Reportes</a>
      <a href="configuracion.html">⚙ Configuración</a>

      <a href="index.html">🚪 Cerrar sesión</a>

    </nav>

  </aside>

  <!-- CONTENIDO -->
  <main class="contenido">

    <header class="topbar">
      <h1>➕ Agregar clientes</h1>
      <span>Panel administrativo</span>
    </header>

    <!-- FORMULARIO -->
    <section class="formulario">

      <h2>Registro de Clientes</h2>

      <form id="formCliente">

        <input type="text" id="razon" placeholder="Razón social o nombre" required>

        <input type="text" id="rfc" placeholder="RFC" required>

        <input type="text" id="cp" placeholder="Código postal" required>

        <input type="text" id="regimen" placeholder="Régimen fiscal" required>

        <input type="text" id="actividad" placeholder="Actividad" required>

        <input type="email" id="correo" placeholder="Correo electrónico" required>

        <input type="text" id="telefono" placeholder="Teléfono" required>

        <input type="password" id="password" placeholder="Contraseña" required>

        <button type="submit">💾 Guardar cliente</button>

      </form>

      <br>

      <a href="dashboard.html">⬅ Regresar a panel principal</a>

    </section>

  </main>

</div>

<script src="js/clientes.js"></script>

</body>
</html>
