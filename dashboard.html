<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel GHEZTORIX</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav>
    <h1>GHEZTORIX</h1>
    <ul>
      <li>Clientes</li>
      <li>Expedientes</li>
      <li>Facturación</li>
      <li>Reportes</li>
    </ul>
  </nav>
  <main>
    <h2>Bienvenido al sistema</h2>
    <div id="clientes"></div>
  </main>
  <script>
    // Ejemplo de clientes simulados
    const clientes = [
      { nombre: "Empresa XYZ", rfc: "XYZ123456789", estado: "Activo" },
      { nombre: "Consultoría ABC", rfc: "ABC987654321", estado: "Pendiente" }
    ];
    const cont = document.getElementById("clientes");
    cont.innerHTML = "<h3>Clientes</h3><ul>" +
      clientes.map(c => `<li>${c.nombre} - ${c.rfc} - ${c.estado}</li>`).join("") +
      "</ul>";
  </script>
</body>
</html>
