<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard GHEZTORIX</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
    <h2>GHEZTORIX - PANEL PRINCIPAL</h2>
    <button onclick="logout()">Cerrar sesión</button>
</header>

<div class="panel">

    <div onclick="mostrar('clientes')" class="card">🧑‍💼 Clientes</div>
    <div onclick="mostrar('consulta')" class="card">🔎 Consulta RFC</div>
    <div onclick="mostrar('registro')" class="card">➕ Registro</div>

</div>

<!-- CLIENTES -->
<section id="clientes" class="seccion">

    <h3>Clientes Registrados</h3>

    <table>
        <thead>
            <tr>
                <th>Nombre</th>
                <th>RFC</th>
                <th>Correo</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody id="tablaClientes"></tbody>
    </table>

</section>

<!-- REGISTRO -->
<section id="registro" class="seccion oculto">

    <h3>Registrar Cliente</h3>

    <input id="nombre" placeholder="Nombre">
    <input id="rfc" placeholder="RFC">
    <input id="correo" placeholder="Correo">

    <button onclick="guardar()">Guardar</button>

</section>

<!-- CONSULTA -->
<section id="consulta" class="seccion oculto">

    <h3>Consulta por RFC</h3>

    <input id="buscarRFC" placeholder="RFC">
    <button onclick="buscar()">Buscar</button>

    <div id="resultado"></div>

</section>

<script src="js/app.js"></script>
</body>
</html>
