<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GHEZTORIX</title>

<link rel="stylesheet" href="css/estilos.css">
</head>

<body>

<!-- HEADER -->
<header class="topbar">
    <div>
        <h1>GHEZTORIX</h1>
        <p>Sistema de Gestión de Despachos</p>
    </div>

    <div>
        <span id="rol"></span>
        <button onclick="logout()">Cerrar sesión</button>
    </div>
</header>

<!-- DASHBOARD -->
<main class="dashboard">

    <!-- ADMIN -->
    <section id="adminPanel" class="panel admin">
        <h2>Panel Administrador</h2>

        <div class="cards">
            <div class="card blue">Clientes</div>
            <div class="card green">Facturas</div>
            <div class="card gold">Impuestos</div>
            <div class="card gray">Reportes</div>
        </div>

    </section>

    <!-- CLIENTE -->
    <section id="clientePanel" class="panel cliente">
        <h2>Panel Cliente</h2>

        <div class="cards">
            <div class="card blue">Mis documentos</div>
            <div class="card green">CFDI</div>
            <div class="card gold">Estados de cuenta</div>
            <div class="card gray">Comentarios</div>
        </div>

    </section>

</main>

<script src="js/dashboard.js"></script>

</body>
</html>
